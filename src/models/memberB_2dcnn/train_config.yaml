# Default configuration for Member B (2D-CNN)
name: "memberB_2dcnn_experiment"
seed: 42
device: "auto"
log_level: "INFO"

model:
  n_classes: 5
  input_channels: 1
  hidden_dims: [32, 64, 128, 256]
  dropout: 0.3
  activation: "relu"

training:
  epochs: 50
  batch_size: 16
  learning_rate: 0.0005
  weight_decay: 0.0001
  scheduler: "cosine"
  grad_clip: 1.0
  patience: 10
  save_freq: 10

data:
  sampling_rate: 100
  epoch_length: 30
  overlap: 0.0
  test_fold: 0
  n_folds: 5
  modalities: ["eeg"]