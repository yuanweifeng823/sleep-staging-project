# Default configuration for Member A (1D-CNN)
name: "memberA_1dcnn_experiment"
seed: 42
device: "auto"
log_level: "INFO"

model:
  n_classes: 5
  input_channels: 1
  hidden_dims: [64, 128, 256]
  dropout: 0.5
  activation: "relu"

training:
  epochs: 80
  batch_size: 64
  learning_rate: 0.0005
  weight_decay: 0.00005
  scheduler: "cosine"
  grad_clip: 1.0
  patience: 10
  save_freq: 10
  # augmentation controls (enabled in memberA training only)
  noise_prob: 0.5
  noise_std: 0.01
  scale_prob: 0.5
  scale_std: 0.05

data:
  sampling_rate: 100
  epoch_length: 30
  overlap: 0.0
  test_fold: 0
  n_folds: 5
  modalities: ["eeg"]